version: "3.9"

services:

  backend:

    build: .

    container_name: smartpos-backend

    restart: unless-stopped

    depends_on:

      - postgres

      - redis

    ports:

      - "3000:3000"

    env_file:

      - .env

  postgres:

    image: postgres:16

    restart: unless-stopped

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

      POSTGRES_DB: smartpos

    ports:

      - "5432:5432"

    volumes:

      - postgres-data:/var/lib/postgresql/data

  redis:

    image: redis:7-alpine

    restart: unless-stopped

    ports:

      - "6379:6379"

volumes:

  postgres-data:
