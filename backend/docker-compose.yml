```yaml
version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: smartpos-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: smartpos
      POSTGRES_PASSWORD: smartpos123
      POSTGRES_DB: smartpos

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpos -d smartpos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
```
